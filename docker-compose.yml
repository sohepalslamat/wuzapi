services:
  wuzapi-server:
    container_name: wuzapi-jack-ai-main-server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WUZAPI_ADMIN_TOKEN=2025@Jack-ai-admin@123
      - DB_USER=jack-wuzapi
      - DB_PASSWORD=jack-wuzapi-admin@123
      - DB_NAME=jack-wuzapi
      - DB_HOST=db
      - DB_PORT=5432
      - TZ=Europe/Istanbul
      - WEBHOOK_FORMAT=json
      - SESSION_DEVICE_NAME=Jack-ai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wuzapi-network
    restart: on-failure

  db:
    container_name: wuzapi-jack-ai-main-db
    image: postgres:16
    environment:
      POSTGRES_USER: jack-wuzapi
      POSTGRES_PASSWORD: jack-wuzapi-admin@123
      POSTGRES_DB: jack-wuzapi
    ports:
      - "5430:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - wuzapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wuzapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
      
networks:
  wuzapi-network:
    driver: bridge

volumes:
  db_data: